# =============================================================================
# SNI Proxy (port 443) + MQTT passthrough (port 8883)
# L4 proxy - routes TLS by SNI without termination.
# Devices see the original Ubiquiti certificate.
# =============================================================================

stream {
    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Any *.ui.com / *.ubnt.com -> same host:443.
    # hostnames is required, otherwise dotted keys match as literals, not wildcards.
    map $ssl_preread_server_name $upstream {
        hostnames;
        .ui.com     $ssl_preread_server_name:443;
        .ubnt.com   $ssl_preread_server_name:443;
        default     "";
    }

    # MQTT cloud back-channel (*.svc.ui.com) - keeps the console online in
    # unifi.ui.com. Runs on 8883, separate listener.
    map $ssl_preread_server_name $mqtt_upstream {
        hostnames;
        .svc.ui.com  $ssl_preread_server_name:8883;
        default      "";
    }

    # Log only Ubiquiti domains
    map $ssl_preread_server_name $log_ui {
        hostnames;
        .ui.com    1;
        .ubnt.com  1;
        default    0;
    }

    log_format stream_ui
        '$time_iso8601 '
        '$remote_addr '
        'sni="$ssl_preread_server_name" '
        'upstream="$upstream_addr" '
        'bytes_sent=$bytes_sent '
        'bytes_received=$bytes_received '
        'time=$session_time';

    access_log /var/log/nginx/stream.log stream_ui if=$log_ui;

    # Firmware / icons / apt / web (443)
    server {
        listen 443;
        listen [::]:443;
        proxy_pass $upstream;
        ssl_preread on;

        proxy_connect_timeout 30s;
        proxy_timeout 600s;
    }

    # MQTT cloud back-channel (8883)
    server {
        listen 8883;
        listen [::]:8883;
        proxy_pass $mqtt_upstream;
        ssl_preread on;

        proxy_connect_timeout 30s;
        proxy_timeout 600s;
    }
}
